app = "qasim-ai-avatar"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  MODEL_NAME = "gpt-4o-mini"
  EMBEDDING_MODEL = "text-embedding-3-small"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
