# Default agent configuration
agent:
  model: gpt-4
  temperature: 0.1
  max_tokens: 4096
  retry:
    max_attempts: 3
    backoff_factor: 2.0
  tools:
    timeout_seconds: 30
    max_concurrent: 5
  memory:
    type: sliding_window
    max_messages: 50
    summarize_after: 30
  guardrails:
    max_iterations: 10
    cost_limit_usd: 5.0
    output_validation: true